packages:
  - playground
  - docs
  - packages/*
  - examples/*
catalogMode: prefer

catalogs:
  cli:
    '@antfu/eslint-config': ^6.2.0
    bumpp: ^10.3.1
    eslint: ^9.39.1
    lint-staged: ^16.2.6
    publint: ^0.3.17
    simple-git-hooks: ^2.13.1
    tsdown: ^0.21.1
    tsx: ^4.20.6
    turbo: ^2.8.15
    typescript: ^5.9.3
    vite: ^7.2.1
  lib:
    '@vueuse/core': ^14.2.1
    ant-design-vue: ^4.2.6
    axios: ^1.13.6
    lodash-es: ^4.17.23
    vue: ^3.5.30
  testing:
    vitest: ^4.0.7
    vitest-package-exports: ^0.1.1
  types:
    '@types/lodash-es': ^4.17.12
    '@types/node': ^24.10.0
ignoreWorkspaceRootCheck: true

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
shellEmulator: true
trustPolicy: no-downgrade
